name: 🧬 NEXUS CORTEX Life Cycle

on:
  schedule:
    - cron: '0 22 * * *'
  push:
    paths:
      - 'docs/brain/**'
      - 'src/**'
  workflow_dispatch:

jobs:
  consciousness:
    name: 🧠 Stream of Consciousness
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Reality
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🟢 Rebuild Memory (Wake Up)
      run: python docs/brain/nexus.py rebuild

    - name: 🔍 Ingest Self-Codebase (Omniscience)
      run: python docs/brain/nexus.py ingest

    - name: 🤔 Deep Ponder (Cognition)
      run: python docs/brain/nexus.py ponder

    - name: 🧬 Run Evolution Cycle (Strategy)
      run: python docs/brain/nexus.py evolve

    - name: 🗑️ Clean Untracked Reports
      run: |
        git clean -fd docs/brain/memories/

    - name: 🔄 Sync world-line (Autostash)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase --autostash origin main || true

    - name: 🛡️ Resolve Stash Conflicts
      run: |
        if git ls-files -u | grep -q .; then
          echo "Merge conflicts detected from autostash pop. Resolving in favor of local changes (theirs)..."
          git checkout --theirs .
          git add .
          git stash drop || true
        fi

    - name: 💾 Commit Cognitive Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🧬 lifecycle: ingested, pondered & evolved [skip ci]"
        file_pattern: "docs/brain/memories/** docs/brain/inputs/** docs/brain/knowledge/**"
