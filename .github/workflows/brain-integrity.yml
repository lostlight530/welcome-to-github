# [FILE: .github/workflows/brain-integrity.yml]
name: 🛡️ NEXUS CORTEX Integrity Check

on: [push, pull_request]

jobs:
  validate-cortex:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # [NEW STEP] Rebuild First!
    # Ensure we are testing the actual knowledge base, not an empty shell.
    - name: 🧠 Reconstruct Cortex
      run: python docs/brain/nexus.py rebuild

    # Now verify status (should show non-zero entities)
    - name: 🏥 Health Check (Status)
      run: python docs/brain/nexus.py status

    # Verify search logic works
    - name: 🔍 Synaptic Search Test
      run: python docs/brain/nexus.py search "nexus"