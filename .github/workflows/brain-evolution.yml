name: 🧠 NEXUS CORTEX Evolution

on:
  schedule:
    - cron: '0 22 * * *' # Daily at 22:00 UTC (6:00 AM CST)
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Cortex
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies (Minimalist)
      run: |
        # Zero-dependency philosophy: Only using standard library where possible.
        # If external tools are needed later, add here.
        echo "No heavy dependencies required."

    - name: 🧠 Reconstruct Cortex (Rehydrate Memory)
      run: |
        # Restore the binary brain from text source-of-truth
        python docs/brain/nexus.py rebuild

    - name: 🧬 Run Evolution Cycle (Harvest -> Dream -> Plan)
      run: |
        python docs/brain/nexus.py evolve

    - name: Commit Evolution Artifacts
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🧬 evolution: memory update & mission generation [skip ci]"
        file_pattern: "docs/brain/memories/*.md docs/brain/inputs/*.json docs/brain/inputs/archive/**/*.md docs/brain/knowledge/**/*.jsonl"
