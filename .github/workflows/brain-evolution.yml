name: 🧠 NEXUS CORTEX Evolution

on:
  schedule:
    - cron: '0 22 * * *' # Daily at 22:00 UTC (6:00 AM CST)
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Cortex
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies (Minimalist)
      run: |
        echo "No heavy dependencies required."

    - name: 🧠 Reconstruct Cortex (Rehydrate Memory)
      run: |
        # Restore the binary brain from text source-of-truth (Silent Load)
        python docs/brain/nexus.py rebuild

    - name: 🧬 Run Evolution Cycle (Harvest -> Dream -> Plan)
      run: |
        python docs/brain/nexus.py evolve

    - name: Commit Evolution Artifacts
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🧬 evolution: memory update & mission generation [skip ci]"
        # [FIX] Track ALL changes in inputs (deletions & archives) + memories + knowledge
        file_pattern: "docs/brain/memories/** docs/brain/inputs/** docs/brain/knowledge/**"